<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Thoughts</title>
    <meta
      name="description"
      content="A reading layer for atomic thoughts on construction, AI, product thinking, and digital transformation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="page">
      <header class="masthead">
        <div class="masthead-copy">
          <p class="eyebrow">ATOMIC NOTES / GITHUB PAGES READER</p>
          <h1>Thoughts</h1>
          <p class="lede">
            A growing vault of short notes on construction, product thinking, AI, and the systems between them.
          </p>
        </div>

        <div class="masthead-meta">
          <div class="meta-card">
            <span class="meta-label">Notes</span>
            <strong id="count-notes">0</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Groups</span>
            <strong id="count-groups">0</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Tags</span>
            <strong id="count-tags">0</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Updated</span>
            <strong id="generated-at">—</strong>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="Search and filters">
        <label class="search">
          <span class="search-label">Search</span>
          <input id="search-input" type="search" placeholder="Title, tag, group, or text" autocomplete="off" />
        </label>

        <div class="toolbar-actions">
          <button id="random-btn" class="action-btn" type="button">Random note</button>
          <button id="latest-btn" class="action-btn" type="button">Latest</button>
          <button id="clear-btn" class="action-btn" type="button">Clear filters</button>
        </div>
      </section>

      <nav class="filters" id="group-filters" aria-label="Group filters"></nav>

      <main class="layout">
        <aside class="index-panel" aria-label="Note index">
          <div class="index-header">
            <p class="index-title">Archive</p>
            <span id="result-count" class="result-count">0 notes</span>
          </div>
          <div id="note-list" class="note-list"></div>
        </aside>

        <article id="reader" class="reader" aria-live="polite"></article>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
