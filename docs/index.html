<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Thoughts</title>
    <meta
      name="description"
      content="A reading layer for atomic thoughts on construction, AI, product thinking, and digital transformation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Press+Start+2P&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page" id="top">
      <header class="topbar">
        <a class="brand" href="#top">
          <span>THOUGHTS</span>
          <span>atomic notes</span>
        </a>
        <a class="repo-link" href="https://github.com/sonomirco/thoughts" target="_blank" rel="noreferrer noopener">
          GitHub
        </a>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <h1>Thoughts</h1>
          <p class="lede">Short notes on construction, product thinking, AI, and the systems between them.</p>
        </div>
      </section>

      <section class="filters-panel" aria-label="Filters">
        <div class="filter-block">
          <div class="section-kicker">Tags</div>
          <nav id="tag-filters" class="chip-row" aria-label="Tag filters"></nav>
        </div>

        <div class="filter-block">
          <div class="section-kicker">Date</div>
          <label class="select-wrap" for="year-filter">
            <select id="year-filter" aria-label="Date filter"></select>
          </label>
        </div>

      </section>

      <section class="catalog-shell" id="catalog">
        <button id="clear-btn" class="clear-btn" type="button">Clear filters</button>

        <main class="layout">
          <aside class="index-panel" aria-label="Note index">
            <div class="index-header">
              <p class="index-title">Catalog</p>
            </div>
            <div id="note-list" class="note-list"></div>
          </aside>

          <article id="reader" class="reader" aria-live="polite"></article>
        </main>
      </section>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
